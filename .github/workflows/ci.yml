name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Lets the contact form succeed against a production build with no live
      # mail provider. See lib/mail.ts.
      MAIL_TRANSPORT: console

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      # Chromium only — the full browser set triples the download for no gain
      # on a suite this size.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser smoke tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
